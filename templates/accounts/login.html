{% extends "base.html" %}
{% block title %}Login – LearnHub{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">
          <i class="fa fa-graduation-cap me-2 text-primary"></i>LearnHub
        </h2>
        <h5 class="text-center text-muted mb-4">Sign in to your account</h5>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small">{{ field.errors.as_text }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
        </form>
        <hr />
        <p class="text-center text-muted small">
          New student? <a href="{% url 'accounts:register_student' %}">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
