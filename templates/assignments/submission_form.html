{% extends "base.html" %}{% block title %}Submit Assignment{% endblock %}
{% block content %}<h2>Submit: {{ assignment.title }}</h2>
<form method="post" enctype="multipart/form-data">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
<button type="submit" class="btn btn-primary">Submit</button></form>{% endblock %}
