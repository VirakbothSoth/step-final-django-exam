{% extends "base.html" %}
{% block title %}My Courses{% endblock %}
{% block content %}
<h2>My Courses</h2>
{% if enrollments %}
  {% for e in enrollments %}
    <div class="card mb-3">
      <div class="card-body d-flex justify-content-between">
        <div>
          <h5>{{ e.course.title }}</h5>
          <div class="progress" style="width:200px;height:8px;">
            <div class="progress-bar" style="width:{{ e.progress_percent }}%"></div>
          </div>
          <small>{{ e.progress_percent }}%</small>
        </div>
        <a href="{% url 'enrollments:course_learn' slug=e.course.slug %}" class="btn btn-primary align-self-center">Continue</a>
      </div>
    </div>
  {% endfor %}
{% else %}
  <p>No courses enrolled. <a href="{% url 'courses:course_list' %}">Browse courses</a></p>
{% endif %}
{% endblock %}
