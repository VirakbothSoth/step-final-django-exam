{% extends "base.html" %}
{% block title %}{{ action }} Lesson{% endblock %}
{% block content %}
<h2>{{ action }} Lesson – {{ course.title }}</h2>
<form method="post" enctype="multipart/form-data">{% csrf_token %}
  {% for field in form %}
    <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors.as_text }}</div>{% endif %}</div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">Save Lesson</button>
  <a href="{% url 'courses:course_detail' slug=course.slug %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
