{% extends "base.html" %}
{% block title %}Delete Tag – LearnHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header text-danger"><strong>Delete Tag</strong></div>
      <div class="card-body">
        <p>Are you sure you want to delete the tag <strong>{{ tag.name }}</strong>?</p>
        <p class="text-muted small">This will remove the tag from all associated courses.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-between">
            <a href="{% url 'courses:manage_tags' %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
