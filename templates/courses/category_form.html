{% extends "base.html" %}{% block title %}{{ action }} Category{% endblock %}
{% block content %}<h2>{{ action }} Category</h2>
<form method="post">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
<button type="submit" class="btn btn-primary">Save</button></form>{% endblock %}
