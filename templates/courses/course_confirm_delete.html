{% extends "base.html" %}
{% block title %}Delete Course{% endblock %}
{% block content %}
<h2>Delete Course</h2>
<p>Are you sure you want to delete <strong>{{ course.title }}</strong>? This cannot be undone.</p>
<form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Delete</button><a href="{% url 'courses:course_detail' slug=course.slug %}" class="btn btn-secondary ms-2">Cancel</a></form>
{% endblock %}
